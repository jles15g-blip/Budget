<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Monthly Budget</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:15px;
margin:0;
}

h1{
text-align:center;
}

.container{
max-width:650px;
margin:auto;
}

.controls{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:10px;
}

input{
padding:8px;
flex:1;
}

button{
padding:8px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button.delete{
background:#d9534f;
}

button.edit{
background:#0275d8;
}

.budget{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card{
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #ddd;
}

.paid{
text-decoration:line-through;
color:gray;
}

.total{
text-align:right;
font-weight:bold;
margin-top:8px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<h1>My Monthly Budget</h1>

<div class="container">

<div class="controls">
<input id="budgetName" placeholder="New Budget (Example: April Budget)">
<button onclick="createBudget()">Create</button>
</div>

<div id="budgets"></div>

</div>

<script>

let budgets=[];

function save(){
localStorage.setItem("budgets",JSON.stringify(budgets));
}

function load(){

let data=localStorage.getItem("budgets");

if(!data)return;

budgets=JSON.parse(data);

budgets.forEach(renderBudget);

}

function createBudget(){

let name=document.getElementById("budgetName").value;

if(!name)return;

let budget={
id:Date.now(),
name:name,
items:[],
locked:false
};

budgets.push(budget);

renderBudget(budget);

save();

document.getElementById("budgetName").value="";
}

function renderBudget(budget){

let div=document.createElement("div");
div.className="budget";
div.dataset.id=budget.id;

div.innerHTML=`

<div class="editArea ${budget.locked?'hidden':''}">

<h2>${budget.name}</h2>

<div class="controls">
<input placeholder="Item name" class="itemName">
<input type="number" placeholder="Amount" class="itemAmount">
<button onclick="addItem(this)">Add</button>
</div>

<table>
<thead>
<tr>
<th>Item</th>
<th>Amount</th>
<th>Paid</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="total">Total: £<span>0</span></div>

<button onclick="saveBudget(this)">Save Budget</button>

</div>

<div class="card ${budget.locked?'':'hidden'}">

<h2>${budget.name}</h2>

<div class="total">Total: £<span class="cardTotal">0</span></div>

<button class="edit" onclick="editBudget(this)">Edit</button>

<button class="delete" onclick="deleteBudget(this)">Delete</button>

</div>

`;

document.getElementById("budgets").appendChild(div);

budget.items.forEach(i=>renderItem(div,i));

updateTotal(div);

}

function addItem(btn){

let budgetDiv=btn.closest(".budget");
let name=budgetDiv.querySelector(".itemName").value;
let amount=Number(budgetDiv.querySelector(".itemAmount").value);

if(!name||!amount)return;

let row=document.createElement("tr");

row.innerHTML=`

<td contenteditable="true">${name}</td>

<td><input type="number" value="${amount}" onchange="updateTotal(this.closest('.budget'))"></td>

<td><input type="date" onchange="togglePaid(this)"></td>

<td><button class="delete" onclick="this.closest('tr').remove()">X</button></td>

`;

budgetDiv.querySelector("tbody").appendChild(row);

updateTotal(budgetDiv);

}

function togglePaid(input){

let row=input.closest("tr");

if(input.value){
row.classList.add("paid");
}else{
row.classList.remove("paid");
}

}

function updateTotal(budgetDiv){

let total=0;

budgetDiv.querySelectorAll("tbody tr").forEach(r=>{
let val=r.children[1].querySelector("input").value;
total+=Number(val);
});

budgetDiv.querySelector(".total span").innerText=total.toFixed(2);

}

function saveBudget(btn){

let budgetDiv=btn.closest(".budget");

let editArea=budgetDiv.querySelector(".editArea");
let card=budgetDiv.querySelector(".card");

let total=budgetDiv.querySelector(".total span").innerText;

card.querySelector(".cardTotal").innerText=total;

editArea.classList.add("hidden");
card.classList.remove("hidden");

}

function editBudget(btn){

let budgetDiv=btn.closest(".budget");

budgetDiv.querySelector(".editArea").classList.remove("hidden");
budgetDiv.querySelector(".card").classList.add("hidden");

}

function deleteBudget(btn){

btn.closest(".budget").remove();

}

load();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Monthly Budget</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

h1{
text-align:center;
}

.container{
max-width:900px;
margin:auto;
}

.budget{
background:white;
padding:15px;
margin-top:20px;
border-radius:8px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
padding:8px;
border-bottom:1px solid #ddd;
}

.paid{
text-decoration:line-through;
color:gray;
}

.total{
font-weight:bold;
margin-top:10px;
}

button{
padding:6px 10px;
margin:5px;
}

input{
padding:6px;
margin:3px;
}
</style>

</head>

<body>

<h1>My Monthly Budget</h1>

<div class="container">

<input id="budgetName" placeholder="New Budget Name (Example: April Budget)">
<button onclick="createBudget()">Create Budget</button>

<div id="budgets"></div>

<datalist id="itemNames"></datalist>

</div>

<script>

let itemNames = new Set();

function createBudget(){

let name = document.getElementById("budgetName").value;

if(!name) return;

let div = document.createElement("div");
div.className="budget";

div.innerHTML=`
<h2>${name}</h2>

<input list="itemNames" placeholder="Item name" class="itemName">
<input type="number" placeholder="Amount" class="itemAmount">
<button onclick="addItem(this)">Add Item</button>

<table>
<thead>
<tr>
<th>Item</th>
<th>Amount</th>
<th>Paid Date</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="total">Total: £<span>0</span></div>
`;

document.getElementById("budgets").appendChild(div);

document.getElementById("budgetName").value="";
}

function addItem(button){

let budget = button.closest(".budget");

let nameInput = budget.querySelector(".itemName");
let amountInput = budget.querySelector(".itemAmount");

let name = nameInput.value;
let amount = parseFloat(amountInput.value);

if(!name || !amount) return;

let tbody = budget.querySelector("tbody");

let row = document.createElement("tr");

let paidInput = document.createElement("input");
paidInput.type="date";

paidInput.onchange=function(){
row.classList.add("paid");
};

row.innerHTML=`
<td>${name}</td>
<td class="amount">${amount.toFixed(2)}</td>
`;

let paidCell=document.createElement("td");
paidCell.appendChild(paidInput);

row.appendChild(paidCell);

tbody.appendChild(row);

addItemName(name);

updateTotal(budget);

nameInput.value="";
amountInput.value="";
}

function updateTotal(budget){

let total=0;

budget.querySelectorAll(".amount").forEach(a=>{
total += parseFloat(a.innerText);
});

budget.querySelector(".total span").innerText=total.toFixed(2);
}

function addItemName(name){

if(itemNames.has(name)) return;

itemNames.add(name);

let option=document.createElement("option");
option.value=name;

document.getElementById("itemNames").appendChild(option);

}

</script>

</body>
</html>

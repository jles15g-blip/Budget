<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Monthly Budget</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:30px;
}

h1{
    text-align:center;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
    padding:8px;
    margin:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border-bottom:1px solid #ddd;
    padding:10px;
    text-align:left;
}

.paid{
    text-decoration: line-through;
    color:gray;
}

.total{
    font-size:20px;
    font-weight:bold;
    text-align:right;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>My Monthly Budget</h1>

<input list="budgetNames" id="name" placeholder="Budget Name">
<datalist id="budgetNames"></datalist>

<input type="number" id="amount" placeholder="Amount">

<button onclick="addItem()">Add</button>

<table id="budgetTable">
<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Paid Date</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="total">
Total: £<span id="total">0</span>
</div>

</div>

<script>

let names = new Set();

function addItem(){

let name = document.getElementById("name").value;
let amount = parseFloat(document.getElementById("amount").value);

if(!name || !amount) return;

let table = document.querySelector("#budgetTable tbody");

let row = document.createElement("tr");

let paidInput = document.createElement("input");
paidInput.type="date";

paidInput.onchange=function(){
row.classList.add("paid");
};

row.innerHTML =
`<td>${name}</td>
<td class="amount">${amount.toFixed(2)}</td>`;

let paidCell = document.createElement("td");
paidCell.appendChild(paidInput);

row.appendChild(paidCell);

table.appendChild(row);

addName(name);
updateTotal();

document.getElementById("name").value="";
document.getElementById("amount").value="";
}

function updateTotal(){

let total = 0;

document.querySelectorAll(".amount").forEach(a=>{
total += parseFloat(a.innerText);
});

document.getElementById("total").innerText = total.toFixed(2);

}

function addName(name){

if(names.has(name)) return;

names.add(name);

let option = document.createElement("option");
option.value = name;

document.getElementById("budgetNames").appendChild(option);

}

</script>

</body>
</html>
